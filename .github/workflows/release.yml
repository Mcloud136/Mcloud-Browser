name: MCloud Browser Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEPOT_TOOLS_WIN_TOOLCHAIN: 0
  CHROMIUM_TAG: 149.0.7827.53

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 python3-pip curl wget unzip lsb-release
          sudo pip3 install httplib2
        shell: bash

      - name: Setup depot_tools
        run: |
          if [ ! -f "depot_tools/fetch" ]; then
            rm -rf depot_tools
            git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi
          chmod +x depot_tools/*
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH
          echo "DEPOT_TOOLS_WIN_TOOLCHAIN=0" >> $GITHUB_ENV
        shell: bash

      - name: Cache depot_tools
        id: cache-depot-tools
        uses: actions/cache@v4
        with:
          path: depot_tools
          key: depot-tools-linux-rel-${{ hashFiles('depot_tools/.git/HEAD') }}
          restore-keys: depot-tools-linux-rel-

      - name: Fetch Chromium
        run: |
          mkdir -p chromium && cd chromium
          fetch --nohooks chromium
          cd src
          git fetch --depth 1 origin tag $CHROMIUM_TAG
          git checkout $CHROMIUM_TAG
          gclient sync --with_branch_heads --with_tags --force --reset --nohooks --delete_unversioned_trees
          gclient runhooks
        shell: bash

      - name: Download PGO profiles
        run: |
          cd chromium/src
          python3 tools/update_pgo_profiles.py --target=win64 update --gs-url-base=chromium-optimization-profiles/pgo_profiles
        continue-on-error: true

      - name: Download V8 PGO profiles
        run: |
          cd chromium/src
          python3 v8/tools/builtins-pgo/download_profiles.py --force download
        continue-on-error: true

      - name: Copy MCloud Browser sources
        run: |
          cd chromium/src
          python3 $GITHUB_WORKSPACE/win_scripts/copy_essentials.py
        env:
          CR_DIR: ${{ github.workspace }}/chromium/src
          THOR_DIR: ${{ github.workspace }}

      - name: Generate build config
        run: |
          cd chromium/src
          gn gen out/mcloud --args="
            target_os=\"win\"
            target_cpu=\"x64\"
            is_official_build=true
            is_debug=false
            is_clang=true
            use_lld=true
            use_thin_lto=true
            thin_lto_enable_optimizations=true
            use_text_section_splitting=true
            enable_precompiled_headers=false
            symbol_level=0
            v8_symbol_level=0
            blink_symbol_level=0
            is_full_optimization_build=true
            proprietary_codecs=true
            ffmpeg_branding=\"Chrome\"
            enable_widevine=true
            bundle_widevine_cdm=true
            enable_platform_hevc=true
            enable_hevc_parser_and_hw_decoder=true
            rtc_enable_avx2=true
            v8_enable_wasm_simd256_revec=true
            v8_enable_maglev=true
            v8_enable_turbofan=true
            v8_enable_builtins_optimization=true
          "

      - name: Build Chrome
        run: |
          cd chromium/src
          autoninja -C out/mcloud chrome

      - name: Build Mini Installer
        run: |
          cd chromium/src
          autoninja -C out/mcloud mini_installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MCloud Browser v${{ steps.version.outputs.VERSION }}"
          body: |
            ## MCloud Browser v${{ steps.version.outputs.VERSION }}

            Chromium ${{ env.CHROMIUM_TAG }} | AVX2 + FMA3 | Linux Cross-Compile

            ### System Requirements
            - Windows 10/11 x64
            - CPU with AVX2 (Intel Haswell 2013+ / AMD Ryzen 2017+)

            ### Features
            - AVX2 + FMA3 native compilation
            - -O3 + Polly + BOLT compiler optimizations
            - HEVC/H.265, VP9, AV1 hardware decode
            - Widevine DRM support
            - Google Translate integration
          files: |
            chromium/src/out/mcloud/mini_installer.exe
          draft: false
          prerelease: false
