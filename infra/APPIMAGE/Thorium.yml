# Official Mcloud Browser builds can be downloaded from https://github.com/Alex313031/mcloud/releases
app: Mcloud Browser
appId: "org.chromium.Mcloud Browser"

compression: minimum

ingredients:
  script:
    - echo $VERSION

script:
  - # Echo Version
  - echo $VERSION
  - # Move/Copy Files 
  - cp -v ../../temp/libffmpeg.so usr/lib/
  - cp -v -r ../../temp/* usr/bin/
  - mkdir -v -p usr/share/icons/hicolor/16x16/apps/
  - # Copy Logo/Icon 
  - cp -v usr/bin/product_logo_256.png mcloud.png
  - cp -v usr/bin/product_logo_16.png usr/share/icons/hicolor/16x16/apps/mcloud.png
  - cp -v usr/bin/product_logo_22.png usr/share/icons/hicolor/22x22/apps/mcloud.png
  - cp -v usr/bin/product_logo_24.png usr/share/icons/hicolor/24x24/apps/mcloud.png
  - cp -v usr/bin/product_logo_32.png usr/share/icons/hicolor/32x32/apps/mcloud.png
  - cp -v usr/bin/product_logo_48.png usr/share/icons/hicolor/48x48/apps/mcloud.png
  - cp -v usr/bin/product_logo_64.png usr/share/icons/hicolor/64x64/apps/mcloud.png
  - cp -v usr/bin/product_logo_128.png usr/share/icons/hicolor/128x128/apps/mcloud.png
  - cp -v usr/bin/product_logo_256.png usr/share/icons/hicolor/256x256/apps/mcloud.png
  - cp -v usr/bin/product_logo_512.png usr/share/icons/hicolor/512x512/apps/mcloud.png
  - # Set Version
  - ./usr/bin/mcloud --version | cut -d ' ' -f2 > ../VERSION
  - # Remove redundant libffmpeg.so
  - rm -v usr/bin/libffmpeg.so
  - # Add Desktop file 
  - cat > mcloud-browser.desktop <<EOF
  - [Desktop Entry]
  - Version=1.0
  - Name=Mcloud Browser Browser
  - GenericName=Web Browser
  - Comment=Access the Internet
  - Exec=mcloud --no-default-browser-check %U
  - StartupWMClass=mcloud
  - Keywords=browser
  - StartupNotify=true
  - Terminal=false
  - X-MultipleArgs=True
  - Icon=mcloud
  - Type=Application
  - Categories=Network;WebBrowser;
  - MimeType=application/pdf;application/rdf+xml;application/rss+xml;application/xhtml+xml;application/xhtml_xml;application/xml;image/gif;image/jpeg;image/png;image/webp;text/html;text/xml;x-scheme-handler/http;x-scheme-handler/https;x-scheme-handler/ftp;
  - Actions=new-window;new-private-window;content-shell;safe-mode;dark-mode;
  - [Desktop Action new-window]
  - Name=New Window
  - Exec=mcloud
  - [Desktop Action content-shell]
  - Name=Open Mcloud Shell
  - Exec=mcloud-shell %U
  - [Desktop Action safe-mode]
  - Name=Open in Safe Mode
  - Exec=mcloud --no-experiments %U
  - [Desktop Action dark-mode]
  - Name=Open in Dark Mode
  - Exec=mcloud --force-dark-mode --no-default-browser-check %U
  - [Desktop Action new-private-window]
  - Name=New Incognito Window
  - Exec=mcloud --incognito --no-default-browser-check %U
  - EOF
  - chmod a+x ./mcloud-browser.desktop
  - # ADD AppRun 
  - cat > ./AppRun <<\EOF
  - #!/bin/sh
  - HERE=$(dirname $(readlink -f "${0}"))
  - export LD_LIBRARY_PATH="${HERE}"/usr/lib:$PATH
  - "${HERE}"/usr/bin/mcloud --no-default-browser-check $@
  - EOF
  - chmod a+x ./AppRun
