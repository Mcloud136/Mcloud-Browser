# =============================================================================
# MCloud Browser — Release Workflow
# =============================================================================
name: MCloud Browser Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release MCloud Browser
    runs-on: windows-latest
    timeout-minutes: 360
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0

    steps:
      - name: Checkout MCloud Browser
        uses: actions/checkout@v4
        with:
          path: mcloud-browser

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache depot_tools
        uses: actions/cache@v4
        with:
          path: depot_tools
          key: depot-tools-win-${{ hashFiles('mcloud-browser/version.sh') }}
          restore-keys: depot-tools-win-

      - name: Setup depot_tools
        run: |
          if (-not (Test-Path depot_tools)) {
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          }
          "$PWD\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Fetch Chromium M149
        run: |
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          mkdir chromium
          cd chromium
          fetch --nohooks --no-history chromium
          cd src
          git checkout tags/149.0.7827.53
          gclient sync --with_branch_heads --with_tags --force --reset --nohooks --delete_unversioned_trees
          gclient runhooks
        shell: pwsh

      - name: Download PGO profiles
        run: |
          cd chromium/src
          python tools/update_pgo_profiles.py --target=win64 update --gs-url-base=chromium-optimization-profiles/pgo_profiles
        shell: bash

      - name: Download V8 PGO profiles
        run: |
          cd chromium/src
          python v8/tools/builtins-pgo/download_profiles.py --depot-tools="$PWD/../../depot_tools" --force download
        shell: bash

      - name: Copy MCloud Browser sources
        run: |
          cd chromium/src
          python ../../mcloud-browser/win_scripts/setup.py
        shell: bash
        env:
          CR_DIR: ${{ github.workspace }}/chromium/src
          THOR_DIR: ${{ github.workspace }}/mcloud-browser

      - name: Generate build configuration
        run: |
          cd chromium/src
          gn gen out/mcloud --args="is_official_build=true is_debug=false target_os=\"win\" target_cpu=\"x64\" use_avx2=true use_avx=true use_fma=true use_sse3=true use_sse41=true use_sse42=true is_clang=true use_lld=true use_thin_lto=true thin_lto_enable_optimizations=true use_text_section_splitting=true enable_precompiled_headers=false symbol_level=0 v8_symbol_level=0 blink_symbol_level=0 proprietary_codecs=true ffmpeg_branding=\"Chrome\" enable_widevine=true bundle_widevine_cdm=true enable_platform_hevc=true enable_hevc_parser_and_hw_decoder=true rtc_enable_avx2=true v8_enable_wasm_simd256_revec=true v8_enable_maglev=true v8_enable_turbofan=true v8_enable_builtins_optimization=true"
        shell: bash

      - name: Build Chrome
        run: |
          cd chromium/src
          autoninja -C out/mcloud chrome
        shell: bash

      - name: Build Mini Installer
        run: |
          cd chromium/src
          autoninja -C out/mcloud mini_installer
        shell: bash

      - name: Create portable zip
        run: |
          cd chromium/src/out/mcloud
          Compress-Archive -Path chrome.exe,chrome_*.pak,*.dll,*.bin,locales,en-US.pak -DestinationPath "MCloud-Browser-portable.zip" -Force
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MCloud Browser v${{ steps.version.outputs.VERSION }}"
          body: |
            ## MCloud Browser v${{ steps.version.outputs.VERSION }}

            Based on Chromium 149.0.7827.53 with AVX2 native compilation.

            ### Downloads
            - **Installer**: `mini_installer.exe`
            - **Portable**: `MCloud-Browser-portable.zip`

            ### System Requirements
            - Windows 10/11 x64
            - CPU with AVX2 support (Intel Haswell 2013+ / AMD Ryzen 2017+)

            ### Features
            - AVX2 + FMA3 native compilation
            - 59 performance optimizations
            - HEVC/H.265 hardware decode
            - Widevine DRM support
            - Google Translate integration
            - Chrome Web Store support
          files: |
            chromium/src/out/mcloud/mini_installer.exe
            chromium/src/out/mcloud/MCloud-Browser-portable.zip
          draft: false
          prerelease: false
